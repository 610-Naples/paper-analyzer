version: '3.8'

services:
  paper-analyzer:
    build: .
    container_name: paper-analyzer
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DEBUG=False
      - PORT=8000
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/rubrics:/app/data/rubrics
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
